<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e1306c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='20' height='20' x='2' y='2' rx='5' ry='5'/%3E%3Cpath d='M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z'/%3E%3Cline x1='17.5' x2='17.51' y1='6.5' y2='6.5'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Instagram — делитесь моментами, смотрите истории и рилсы, общайтесь с друзьями." />
    <title>Instagram</title>
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      function showGlobalError(title, msg) {
        const errorDiv = document.createElement('div');
        errorDiv.id = 'js-error-overlay';
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = 'white';
        errorDiv.style.color = 'red';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.padding = '20px';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h1>' + title + '</h1><pre>' + msg + '</pre>';
        const target = document.body || document.documentElement;
        if (target) {
          target.appendChild(errorDiv);
        }
      }

      window.addEventListener('error', function(e) {
        const msg = e.message + '\n' + (e.error ? e.error.stack : '');
        alert('JS Error: ' + msg);
        showGlobalError('JS Error', msg);
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        const msg = e.reason ? (e.reason.message + '\n' + e.reason.stack) : 'Unknown async error';
        alert('Promise Rejection: ' + msg);
        showGlobalError('Promise Rejection', msg);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
